<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 교무실 실시간 호출 현황판</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #0f172a; /* 어두운 네이비 배경 (전광판 느낌) */
            color: #f8fafc;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 28px;
            color: #38bdf8; /* 밝은 푸른색 */
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .clock {
            font-size: 18px;
            color: #94a3b8;
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .teacher-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        .teacher-card.has-call {
            border-color: #ef4444; /* 호출 있으면 빨간 테두리 */
            background-color: #1a1625; 
        }
        .teacher-name {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: normal;
        }
        .badge.waiting {
            background-color: #ef4444;
            color: white;
            animation: blink 1.5s infinite;
        }
        .badge.empty {
            background-color: #475569;
            color: #cbd5e1;
        }
        .call-item {
            background: #273549;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #38bdf8;
        }
        .call-item:last-child {
            margin-bottom: 0;
        }
        .student-info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
            color: #f1f5f9;
            margin-bottom: 5px;
        }
        .reason-text {
            font-size: 14px;
            color: #94a3b8;
            word-break: break-all;
        }
        .loading {
            text-align: center;
            font-size: 20px;
            color: #94a3b8;
            grid-column: 1 / -1;
            padding: 50px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🔔 3학년 교무실 실시간 호출 현황판</h1>
        <div class="clock" id="liveClock">로딩 중...</div>
    </div>

    <div class="grid-container" id="boardGrid">
        <div class="loading">호출 데이터를 불러오는 중입니다...</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxvmxZtofkVzIuwgtj581coW0v4QN86YXi5si4YeQ8Cb5aAE6DKsQmgr8kh2flq2j7HMw/exec";
        
        // 3학년 선생님 목록 배열
        const teachers = [
            "김건우 선생님", "김영민 선생님", "노여진 선생님", "박기만 선생님", 
            "이의진 선생님", "이필권 선생님", "이주영 선생님", "홍지연 선생님", 
            "강만규 선생님", "최아현 선생님", "채정태 선생님"
        ];

        // 시계 기능
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 실시간 데이터 로딩 기능
        function fetchCalls() {
            fetch(GAS_URL + "?action=getCalls")
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderBoard(data.data);
                    }
                })
                .catch(err => console.error("데이터 로드 실패:", err));
        }

        function renderBoard(calls) {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = ""; // 기존 내용 초기화

            // 각 선생님별로 호출을 분류할 객체 생성
            const teacherMap = {};
            teachers.forEach(t => { teacherMap[t] = []; });

            // 들어온 전체 호출 데이터를 분석하여 매칭되는 선생님께 할당
            calls.forEach(item => {
                // item.reason 예시: "[홍지연 선생님 (영어)] 수행평가 질문 있습니다"
                // 어떤 선생님 명단이 포함되어 있는지 확인합니다.
                let matchedTeacher = null;
                for (let t of teachers) {
                    if (item.reason && item.reason.includes(t)) {
                        matchedTeacher = t;
                        break;
                    }
                }

                if (matchedTeacher) {
                    // 대시보드에 뿌려줄 때는 사유에서 [선생님 이름] 부분을 잘라내고 순수 사유만 추출
                    const cleanReason = item.reason.replace(/\[.*?\]\s*/, "");
                    teacherMap[matchedTeacher].push({
                        name: item.student_name,
                        location: item.location,
                        reason: cleanReason
                    });
                }
            });

            // 화면에 카드 배치하기
            teachers.forEach(t => {
                const list = teacherMap[t];
                const hasCall = list.length > 0;
                
                const card = document.createElement('div');
                card.className = `teacher-card ${hasCall ? 'has-call' : ''}`;

                // 카드 상단 (선생님 성함 및 대기 뱃지)
                let badgeHtml = hasCall ? `<span class="badge waiting">대기 ${list.length}명</span>` : `<span class="badge empty">대기 없음</span>`;
                
                let cardHtml = `
                    <div class="teacher-name">
                        <span>${t}</span>
                        ${badgeHtml}
                    </div>
                `;

                // 카드 내부 (학생 호출 리스트)
                if (hasCall) {
                    list.forEach(student => {
                        cardHtml += `
                            <div class="call-item">
                                <div class="student-info">
                                    <span>👤 ${student.name}</span>
                                    <span style="color: #f59e0b;">📍 ${student.location}</span>
                                </div>
                                <div class="reason-text">${student.reason}</div>
                            </div>
                        `;
                    });
                } else {
                    cardHtml += `<p style="color: #475569; font-size: 14px; text-align: center; padding: 20px 0;">현재 호출이 없습니다.</p>`;
                }

                card.innerHTML = cardHtml;
                grid.appendChild(card);
            });
        }

        // 5초마다 자동으로 데이터를 새로고침 (실시간 반영)
        setInterval(fetchCalls, 5000);
        fetchCalls(); // 처음 켰을 때도 즉시 로드
    </script>
</body>
</html>
