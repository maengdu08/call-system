<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님 호출 시스템 (학생용)</title>
    <style>
        /* 깔끔하고 직관적인 모바일 최적화 디자인 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
            width: 100%;
            max-width: 420px;
        }
        .header {
            text-align: center;
            margin-bottom: 26px;
        }
        .header h1 {
            font-size: 24px;
            color: #1e3a8a;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            color: #64748b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #475569;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
            background-color: #f8fafc;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2563eb;
        }
        button:active {
            transform: scale(0.99);
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
            line-height: 1.5;
        }
        .success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🙋‍♂️ 선생님, 도와주세요!</h1>
            <p>정보를 입력하고 아래 버튼을 누르면 접수됩니다.</p>
        </div>
        
        <form id="callForm">
            <div class="form-group">
                <label for="studentName">학생 이름</label>
                <input type="text" id="studentName" required placeholder="이름을 입력하세요 (예: 홍길동)">
            </div>

            <div class="form-group">
                <label for="teacherSelect">호출할 선생님 선택</label>
                <select id="teacherSelect" required>
                    <option value="" disabled selected>선생님을 선택해 주세요</option>
                    <option value="김건우 선생님 (국어)">김건우 선생님 (국어)</option>
                    <option value="김영민 선생님 (사회)">김영민 선생님 (사회)</option>
                    <option value="노여진 선생님 (국어)">노여진 선생님 (국어)</option>
                    <option value="박기만 선생님 (윤리)">박기만 선생님 (윤리)</option>
                    <option value="이의진 선생님 (체육)">이의진 선생님 (체육)</option>
                    <option value="이필권 선생님 (미술)">이필권 선생님 (미술)</option>
                    <option value="이주영 선생님 (화학)">이주영 선생님 (화학)</option>
                    <option value="홍지연 선생님 (영어)">홍지연 선생님 (영어)</option>
                    <option value="강만규 선생님 (물리학)">강만규 선생님 (물리학)</option>
                    <option value="최아현 선생님 (지구과학)">최아현 선생님 (지구과학)</option>
                    <option value="채정태 선생님 (수학)">채정태 선생님 (수학)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="locationClass">현재 위치 (반)</label>
                <select id="locationClass" required>
                    <option value="" disabled selected>본인의 반을 선택해 주세요</option>
                    <option value="1반">1반</option>
                    <option value="2반">2반</option>
                    <option value="3반">3반</option>
                    <option value="4반">4반</option>
                    <option value="5반">5반</option>
                    <option value="6반">6반</option>
                    <option value="7반">7반</option>
                    <option value="8반">8반</option>
                    <option value="9반">9반</option>
                    <option value="10반">10반</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="reasonInput">무엇을 도와드릴까요? (구체적 사유)</label>
                <input type="text" id="reasonInput" required placeholder="예: 수행평가 질문 있습니다, 과제 제출">
            </div>
            
            <button type="submit" id="submitBtn">선생님 호출하기</button>
        </form>
        
        <!-- 결과 메시지가 표시되는 상자 -->
        <div id="msgBox" class="message"></div>
    </div>

    <script>
        // ⚠️ [중요] 구글 Apps Script 웹 앱 URL 주소를 아래 큰따옴표 안에 붙여넣으세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzDc5PM6lachSJ7KJpwTXNtxsw9W2XZENPa6Ain_FrjmStQYWRhW3JPZ3DbRvlaGH5u_w/exec";

        document.getElementById('callForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 새로고침 방지
            
            const submitBtn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('msgBox');
            
            // 입력된 값 가져오기
            const name = document.getElementById('studentName').value;
            const teacher = document.getElementById('teacherSelect').value;
            const selectedClass = document.getElementById('locationClass').value;
            const textReason = document.getElementById('reasonInput').value;
            
            // 기존 대시보드 양식(location, reason)에 맞춰 데이터를 조합합니다.
            const finalLocation = selectedClass; 
            const finalReason = "[" + teacher + "] " + textReason;

            // 버튼 비활성화
            submitBtn.disabled = true;
            submitBtn.innerText = "호출 전송 중...";
            msgBox.style.display = "none";

            if(GAS_URL === "https://script.google.com/macros/s/AKfycbzDc5PM6lachSJ7KJpwTXNtxsw9W2XZENPa6Ain_FrjmStQYWRhW3JPZ3DbRvlaGH5u_w/exec") {
                alert("코드 내부의 GAS_URL 주소를 본인의 Apps Script 주소로 변경해야 작동합니다!");
                submitBtn.disabled = false;
                submitBtn.innerText = "선생님 호출하기";
                return;
            }
            
            // 구글 Apps Script로 데이터 전송
            fetch(GAS_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify({
                    action: "createCall",
                    student_name: name,
                    location: finalLocation,
                    reason: finalReason
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    msgBox.className = "message success";
                    msgBox.innerHTML = "<strong>🔔 호출 성공!</strong><br>" + teacher + "께 대기열이 등록되었습니다. " + selectedClass + "에서 차분히 기다려주세요.";
                    msgBox.style.display = "block";
                    submitBtn.innerText = "접수 완료";
                    
                    setTimeout(() => {
                        submitBtn.disabled = false;
                        submitBtn.innerText = "선생님 호출하기";
                    }, 20000);
                } else {
                    throw new Error(data.error || "서버 에러");
                }
            })
            .catch(err => {
                msgBox.className = "message error";
                msgBox.innerHTML = "<strong>❌ 전송 실패</strong><br>네트워크가 불안정합니다. 손을 들어 선생님을 불러주세요.";
                msgBox.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.innerText = "선생님 호출하기";
            });
        });
    </script>
</body>
</html>
